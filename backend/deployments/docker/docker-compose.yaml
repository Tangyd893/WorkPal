services:
  postgres:
    image: postgres:16-alpine
    container_name: workpal-postgres
    environment:
      POSTGRES_DB: workpal
      POSTGRES_USER: workpal
      POSTGRES_PASSWORD: workpal123
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workpal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: workpal-redis
    ports:
      - "6379:6379"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
