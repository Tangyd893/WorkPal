server:
  port: 8080
  mode: debug  # debug / release
  jwt_secret: "workpal-secret-change-in-production"
  jwt_expiry_hours: 72

database:
  host: "localhost"
  port: 5432
  user: "workpal"
  password: "workpal123"
  dbname: "workpal"
  max_open_conns: 25
  max_idle_conns: 10

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  streams_key: "workpal:streams"  # Redis Streams consumer group key

file:
  store_type: "local"  # 本地存储（生产环境换 MinIO 需要 Go 1.25+）
  local_base_path: "/tmp/workpal-files"
  max_file_size_mb: 100
  minio:
    endpoint: "localhost:9000"
    access_key: "workpal"
    secret_key: "workpal123456"
    bucket: "workpal"
    use_ssl: false

search:
  engine: "bleve"  # bleve / elasticsearch
  bleve:
    index_path: "/tmp/workpal-search"  # 内存索引路径
  elasticsearch:
    addresses:
      - "localhost:9200"
    index: "workpal-messages"

ws:
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_interval_seconds: 30
  pong_wait_seconds: 60
  max_message_size: 65535

pagination:
  default_page_size: 20
  max_page_size: 100
