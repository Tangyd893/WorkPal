server:
  port: 8080
  mode: debug
  jwtSecret: "dev-only-change-me"
  internalToken: "dev-internal-token"
  jwtExpiryHours: 72

services:
  gatewayPort: 8080
  userPort: 8081
  imPort: 8082
  filePort: 8083
  searchPort: 8084
  workspacePort: 8085
  userURL: "http://localhost:8081"
  imURL: "http://localhost:8082"
  fileURL: "http://localhost:8083"
  searchURL: "http://localhost:8084"
  workspaceURL: "http://localhost:8085"

gateway:
  healthTimeoutMs: 3000
  rateLimit:
    requests: 180
    windowMs: 60000
  retry:
    maxAttempts: 2
    backoffMs: 75
  circuitBreaker:
    failureThreshold: 5
    coolDownMs: 10000
  timeouts:
    defaultMs: 8000
    userMs: 5000
    imMs: 15000
    fileMs: 20000
    searchMs: 5000
    workspaceMs: 8000

registry:
  enabled: true
  namespace: "workpal:registry"
  ttlMs: 15000
  heartbeatMs: 5000

database:
  host: "localhost"
  port: 5432
  user: "workpal"
  password: "workpal123"
  adminDBName: "postgres"
  maxOpenConns: 25
  maxIdleConns: 5
  names:
    user: "workpal_user"
    im: "workpal_im"
    file: "workpal_file"
    workspace: "workpal_workspace"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  streamsKey: "workpal:streams:messages"

file:
  storeType: "minio"
  localBaseDir: "./uploads"
  maxFileSizeMB: 50
  minio:
    endpoint: "localhost:9000"
    accessKey: "workpal"
    secretKey: "workpal123456"
    bucket: "workpal"
    useSSL: false

search:
  engine: "bleve"
  bleve:
    indexPath: "./data/search"

ws:
  readBufferSize: 1024
  writeBufferSize: 1024
  pingIntervalSec: 30
  pongWaitSec: 60
  maxMessageSize: 65536
