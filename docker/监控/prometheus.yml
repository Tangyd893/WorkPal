global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: workpal-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: workpal-user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: workpal-im-service
    metrics_path: /metrics
    static_configs:
      - targets: ["im-service:8082"]

  - job_name: workpal-file-service
    metrics_path: /metrics
    static_configs:
      - targets: ["file-service:8083"]

  - job_name: workpal-search-service
    metrics_path: /metrics
    static_configs:
      - targets: ["search-service:8084"]

  - job_name: workpal-workspace-service
    metrics_path: /metrics
    static_configs:
      - targets: ["workspace-service:8085"]

  - job_name: workpal-project-service
    metrics_path: /metrics
    static_configs:
      - targets: ["project-service:8086"]

  - job_name: workpal-docs-service
    metrics_path: /metrics
    static_configs:
      - targets: ["docs-service:8087"]

  - job_name: workpal-calendar-service
    metrics_path: /metrics
    static_configs:
      - targets: ["calendar-service:8088"]

  - job_name: workpal-approval-service
    metrics_path: /metrics
    static_configs:
      - targets: ["approval-service:8089"]

  - job_name: workpal-notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:8090"]

  - job_name: workpal-ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8091"]
