global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: workpal-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: workpal-user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: workpal-im-service
    metrics_path: /metrics
    static_configs:
      - targets: ["im-service:8082"]

  - job_name: workpal-file-service
    metrics_path: /metrics
    static_configs:
      - targets: ["file-service:8083"]

  - job_name: workpal-search-service
    metrics_path: /metrics
    static_configs:
      - targets: ["search-service:8084"]

  - job_name: workpal-workspace-service
    metrics_path: /metrics
    static_configs:
      - targets: ["workspace-service:8085"]
