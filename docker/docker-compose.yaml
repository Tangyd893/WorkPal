services:
  postgres:
    image: postgres:16-alpine
    container_name: workpal-postgres
    environment:
      POSTGRES_DB: workpal
      POSTGRES_USER: workpal
      POSTGRES_PASSWORD: workpal123
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workpal"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: workpal-redis
    ports:
      - "6379:6379"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: workpal-minio
    environment:
      MINIO_ROOT_USER: workpal
      MINIO_ROOT_PASSWORD: workpal123456
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    command: server /data --console-address ":9001"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  user-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    container_name: workpal-user-service
    environment: &backend_env
      CONFIG_PATH: /app/configs/config.example.yaml
      SERVER_MODE: debug
      SERVER_INTERNALTOKEN: workpal-internal-dev-token
      DATABASE_HOST: postgres
      DATABASE_ADMINDBNAME: postgres
      DATABASE_NAMES_USER: workpal_user
      DATABASE_NAMES_IM: workpal_im
      DATABASE_NAMES_FILE: workpal_file
      DATABASE_NAMES_WORKSPACE: workpal_workspace
      REDIS_HOST: redis
      FILE_STORETYPE: minio
      FILE_MINIO_ENDPOINT: minio:9000
      SERVICES_USERURL: http://user-service:8081
      SERVICES_IMURL: http://im-service:8082
      SERVICES_FILEURL: http://file-service:8083
      SERVICES_SEARCHURL: http://search-service:8084
      SERVICES_WORKSPACEURL: http://workspace-service:8085
      SERVICES_PROJECTURL: http://project-service:8086
      DATABASE_NAMES_PROJECT: workpal_project
      DATABASE_NAMES_NOTIFICATION: workpal_notification
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: unless-stopped

  im-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: im-service
    container_name: workpal-im-service
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped

  file-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: file-service
    container_name: workpal-file-service
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      im-service:
        condition: service_started
    ports:
      - "8083:8083"
    restart: unless-stopped

  search-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: search-service
    container_name: workpal-search-service
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      im-service:
        condition: service_started
    ports:
      - "8084:8084"
    volumes:
      - search_data:/app/data/search
    restart: unless-stopped

  workspace-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: workspace-service
    container_name: workpal-workspace-service
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped

  project-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: project-service
    container_name: workpal-project-service
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8086:8086"
    restart: unless-stopped

  notification-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: notification-service
    container_name: workpal-notification-service
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8090:8090"
    restart: unless-stopped

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.8
    container_name: workpal-kafka
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://kafka:9092,external://localhost:19092
    ports:
      - "19092:19092"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: workpal-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    container_name: workpal-gateway
    environment: *backend_env
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      im-service:
        condition: service_started
      file-service:
        condition: service_started
      search-service:
        condition: service_started
      workspace-service:
        condition: service_started
      project-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: workpal-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./监控/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started
      user-service:
        condition: service_started
      im-service:
        condition: service_started
      file-service:
        condition: service_started
      search-service:
        condition: service_started
      workspace-service:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: workpal-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./监控/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./监控/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: workpal-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  search_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  kafka_data:
