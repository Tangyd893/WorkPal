apiVersion: v1
kind: Namespace
metadata:
  name: workpal
---
apiVersion: v1
kind: Secret
metadata:
  name: workpal-secret
  namespace: workpal
type: Opaque
stringData:
  SERVER_JWTSECRET: "请替换为生产 JWT 密钥"
  SERVER_INTERNALTOKEN: "请替换为服务间调用密钥"
  DATABASE_PASSWORD: "请替换为数据库密码"
  REDIS_PASSWORD: ""
  FILE_MINIO_ACCESSKEY: "请替换为 MinIO AccessKey"
  FILE_MINIO_SECRETKEY: "请替换为 MinIO SecretKey"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workpal-config
  namespace: workpal
data:
  SERVER_MODE: "release"
  DATABASE_HOST: "postgres"
  DATABASE_USER: "workpal"
  DATABASE_ADMINDBNAME: "postgres"
  REDIS_HOST: "redis"
  FILE_STORETYPE: "minio"
  FILE_MINIO_ENDPOINT: "minio:9000"
  SERVICES_USERURL: "http://user-service:8081"
  SERVICES_IMURL: "http://im-service:8082"
  SERVICES_FILEURL: "http://file-service:8083"
  SERVICES_SEARCHURL: "http://search-service:8084"
  SERVICES_WORKSPACEURL: "http://workspace-service:8085"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: workpal
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: workpal
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workpal-secret
                  key: DATABASE_PASSWORD
            - name: POSTGRES_DB
              value: postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "workpal"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: workpal
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: workpal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: workpal
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: workpal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: workpal-secret
                  key: FILE_MINIO_ACCESSKEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workpal-secret
                  key: FILE_MINIO_SECRETKEY
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: workpal
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: workpal
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: workpal/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: workpal-config
            - secretRef:
                name: workpal-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: workpal
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
---
